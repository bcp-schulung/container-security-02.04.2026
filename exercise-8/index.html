<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Page</title>
    <style>
        body {
            font-family: Comic Sans MS, cursive;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 3em;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .joke {
            background: white;
            padding: 20px;
            margin: 20px auto;
            border-radius: 10px;
            max-width: 500px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .joke:hover {
            transform: scale(1.05);
        }
        button {
            padding: 10px 20px;
            font-size: 1.2em;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <h1>🎪 Welcome to the Comedy Club 🎪</h1>
    
    <div class="joke">
        <p><strong>Why did the developer go broke?</strong></p>
        <p>Because he used up all his cache! 💸</p>
    </div>
    
    <div class="joke">
        <p><strong>How many programmers does it take to change a light bulb?</strong></p>
        <p>None, that's a hardware problem! 🔧</p>
    </div>
    
    <button onclick="alert('You found the secret button! 🎉')">Click me!</button>
</body>
</html>
