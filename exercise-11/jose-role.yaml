apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: jose
  name: bencoepp-dev
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "delete"]

- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jose-dev-reader
  namespace: jose
subjects:
- kind: User
  name: jose
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: jose-dev
  apiGroup: rbac.authorization.k8s.io